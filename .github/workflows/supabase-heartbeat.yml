name: Supabase Heartbeat

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase heartbeat endpoint
        env:
          HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
          HEARTBEAT_TOKEN: ${{ secrets.HEARTBEAT_TOKEN }}
        run: |
          if [ -z "$HEARTBEAT_URL" ] || [ -z "$HEARTBEAT_TOKEN" ]; then
            echo "Missing required secrets: HEARTBEAT_URL or HEARTBEAT_TOKEN"
            exit 1
          fi

          echo "Pinging: $HEARTBEAT_URL"

          STATUS=$(curl --silent --show-error --max-time 20 --retry 2 --retry-delay 5 \
            -H "x-heartbeat-token: $HEARTBEAT_TOKEN" \
            --write-out "%{http_code}" \
            --output /tmp/heartbeat-response.txt \
            "$HEARTBEAT_URL")

          echo "HTTP status: $STATUS"
          echo "Response body:"
          RESPONSE_BODY="$(cat /tmp/heartbeat-response.txt)"
          echo "$RESPONSE_BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Heartbeat request failed with non-2xx status."
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("/tmp/heartbeat-response.txt").read_text(encoding="utf-8").strip()
          if not raw:
              raise SystemExit("Heartbeat response body is empty")

          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Heartbeat response is not valid JSON: {exc}") from exc

          if payload.get("ok") is not True:
              raise SystemExit(f"Heartbeat response has ok!=true: {payload}")

          mode = payload.get("heartbeatMode")
          allowed = {"write-sdk", "write-rest-fallback", "read-fallback"}
          if mode not in allowed:
              raise SystemExit(f"Unexpected heartbeat mode '{mode}'. Payload: {payload}")

          if mode == "read-fallback":
              print("Heartbeat passed in read-fallback mode. Create heartbeat_log for write mode.")
          else:
              print(f"Heartbeat passed in {mode} mode.")
          PY
